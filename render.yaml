services:
  # ── Backend Flask ──────────────────────────────────────
  - type: web
    name: baul-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        sync: false        # se configura manualmente en el dashboard
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # ── Frontend React ─────────────────────────────────────
  - type: web
    name: baul-web
    runtime: static
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: ./web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
